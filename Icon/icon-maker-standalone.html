// ===== Shape Path Logic =====
function getShapePath(shape, m) {
  m = m || 1;
  const p = 4, W = 100*m, H = 100, sw = W-2*p, sh = H-2*p, cx = W/2, cy = H/2;
  switch(shape) {
    case 'none': return '';
    case 'circle': {
      if (m===1) { const r=sh/2; return 'M'+cx+','+p+' A'+r+','+r+' 0 1,1 '+cx+','+(p+sh)+' A'+r+','+r+' 0 1,1 '+cx+','+p+'Z'; }
      const rx=sw/2, ry=sh/2;
      return 'M'+cx+','+p+' A'+rx+','+ry+' 0 1,1 '+cx+','+(p+sh)+' A'+rx+','+ry+' 0 1,1 '+cx+','+p+'Z';
    }
    case 'square': return 'M'+p+','+p+' H'+(p+sw)+' V'+(p+sh)+' H'+p+'Z';
    case 'rounded-square': {
      const r=sh*0.22;
      return 'M'+(p+r)+','+p+' H'+(p+sw-r)+' Q'+(p+sw)+','+p+' '+(p+sw)+','+(p+r)+' V'+(p+sh-r)+' Q'+(p+sw)+','+(p+sh)+' '+(p+sw-r)+','+(p+sh)+' H'+(p+r)+' Q'+p+','+(p+sh)+' '+p+','+(p+sh-r)+' V'+(p+r)+' Q'+p+','+p+' '+(p+r)+','+p+'Z';
    }
    case 'squircle': {
      const rx=sw/2, ry=sh/2, n=5; let pts=[];
      for(let i=0;i<=360;i+=2){const a=(i/360)*2*Math.PI-Math.PI/4,c=Math.cos(a),s=Math.sin(a),rf=Math.pow(Math.pow(Math.abs(c),n)+Math.pow(Math.abs(s),n),-1/n);pts.push((cx+rf*rx*c)+','+(cy+rf*ry*s));}
      return 'M'+pts.join('L')+'Z';
    }
    case 'hexagon': {
      const rx=sw/2,ry=sh/2;let pts=[];
      for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;pts.push((cx+rx*Math.cos(a))+','+(cy+ry*Math.sin(a)));}
      return 'M'+pts.join('L')+'Z';
    }
    case 'shield-shape':
      return 'M'+cx+','+p+' L'+(p+sw)+','+(p+sh*0.15)+' L'+(p+sw)+','+(p+sh*0.55)+' Q'+(p+sw)+','+(p+sh*0.85)+' '+cx+','+(p+sh)+' Q'+p+','+(p+sh*0.85)+' '+p+','+(p+sh*0.55)+' L'+p+','+(p+sh*0.15)+'Z';
    default: return '';
  }
}

function gradCoords(angle) {
  const r=((angle-90)*Math.PI)/180;
  return {x1:(50-Math.cos(r)*50)+'%',y1:(50-Math.sin(r)*50)+'%',x2:(50+Math.cos(r)*50)+'%',y2:(50+Math.sin(r)*50)+'%'};
}

// ===== Generate Export SVG =====
function generateSVG(cfg, size, customSVG, mult) {
  mult = mult || 1;
  const vw=100*mult, vh=100, sp=getShapePath(cfg.shape,mult), gc=gradCoords(cfg.gradientAngle);
  const ivw=vw*0.45*cfg.iconScale, ivh=vh*0.45*cfg.iconScale;
  const ox=(vw-ivw)/2, oy=(vh-ivh)/2;
  const ew=size*mult, eh=size;
  let defs='';
  if(cfg.useGradient) defs+='<linearGradient id="bg-grad" x1="'+gc.x1+'" y1="'+gc.y1+'" x2="'+gc.x2+'" y2="'+gc.y2+'"><stop offset="0%" stop-color="'+cfg.bgColor1+'"/><stop offset="100%" stop-color="'+cfg.bgColor2+'"/></linearGradient>';
  if(cfg.shadowEnabled) defs+='<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.25"/></filter>';
  const fill=cfg.useGradient?'url(#bg-grad)':cfg.bgColor1;
  const filt=cfg.shadowEnabled?' filter="url(#shadow)"':'';
  let border='';
  if(cfg.borderEnabled) border='<path d="'+sp+'" fill="none" stroke="'+cfg.borderColor+'" stroke-width="'+cfg.borderWidth+'"/>';
  const iconContent = customSVG || (ICON_SVG_DATA[cfg.iconSymbol]||'');
  const icx=ox+cfg.iconOffsetX+ivw/2, icy=oy+cfg.iconOffsetY+ivh/2;
  let tr=[];
  if(cfg.iconRotation!==0) tr.push('rotate('+cfg.iconRotation+' '+icx+' '+icy+')');
  if(cfg.iconFlipH) tr.push('translate('+(2*icx)+' 0) scale(-1 1)');
  if(cfg.iconFlipV) tr.push('translate(0 '+(2*icy)+') scale(1 -1)');
  const trA=tr.length?' transform="'+tr.join(' ')+'"':'';
  const opA=cfg.iconOpacity<1?' opacity="'+cfg.iconOpacity+'"':'';
  const vb=mult>1?'0 0 '+(24*mult)+' 24':'0 0 24 24';
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+ew+'" height="'+eh+'" viewBox="0 0 '+vw+' '+vh+'">\n<defs>'+defs+'</defs>\n<path d="'+sp+'" fill="'+fill+'"'+filt+'/>\n'+border+'\n<g'+trA+opA+'>\n<svg x="'+(ox+cfg.iconOffsetX)+'" y="'+(oy+cfg.iconOffsetY)+'" width="'+ivw+'" height="'+ivh+'" viewBox="'+vb+'" fill="'+(cfg.iconFilled?cfg.iconColor:'none')+'" stroke="'+cfg.iconColor+'" stroke-width="'+cfg.iconStrokeWidth+'" stroke-linecap="round" stroke-linejoin="round">\n'+iconContent+'\n</svg>\n</g>\n</svg>';
}

  const trA=tr.length?' transform="'+tr.join(' ')+'"':'';

  const vb=mult>1?'0 0 '+(24*mult)+' 24':'0 0 24 24';
  let defs='';
  if(cfg.useGradient) defs+='<linearGradient id="g-'+uid+'" x1="'+gc.x1+'" y1="'+gc.y1+'" x2="'+gc.x2+'" y2="'+gc.y2+'"><stop offset="0%" stop-color="'+cfg.bgColor1+'"/><stop offset="100%" stop-color="'+cfg.bgColor2+'"/></linearGradient>';
  if(cfg.shadowEnabled) defs+='<filter id="s-'+uid+'" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.25"/></filter>';
  const fill=cfg.useGradient?'url(#g-'+uid+')':cfg.bgColor1;
  const filt=cfg.shadowEnabled?' filter="url(#s-'+uid+')"':'';
  let border='';
  if(cfg.borderEnabled) border='<path d="'+sp+'" fill="none" stroke="'+cfg.borderColor+'" stroke-width="'+cfg.borderWidth+'"/>';
  return '<svg width="'+sw+'" height="'+sh+'" viewBox="0 0 '+vw+' '+vh+'" xmlns="http://www.w3.org/2000/svg"><defs>'+defs+'</defs><path d="'+sp+'" fill="'+fill+'"'+filt+'/>'+border+'<g'+trA+opA+'><svg x="'+(ox+cfg.iconOffsetX)+'" y="'+(oy+cfg.iconOffsetY)+'" width="'+ivw+'" height="'+ivh+'" viewBox="'+vb+'" fill="'+(cfg.iconFilled?cfg.iconColor:'none')+'" stroke="'+cfg.iconColor+'" stroke-width="'+cfg.iconStrokeWidth+'" stroke-linecap="round" stroke-linejoin="round">'+iconContent+'</svg></g></svg>';
}

// ===== Download Helpers =====
function downloadSVG() {
  const customSVG = selectedCustomId ? (customIcons.find(ic=>ic.id===selectedCustomId)||{}).svgContent : undefined;
  const svg = generateSVG(config, exportSize, customSVG);
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const a = document.createElement('a'); a.download='icon-'+exportSize+'.svg'; a.href=URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href);
}
function downloadPNG() {
  const customSVG = selectedCustomId ? (customIcons.find(ic=>ic.id===selectedCustomId)||{}).svgContent : undefined;
  const svg = generateSVG(config, exportSize, customSVG);
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image(); img.onload=function(){
    const c=document.createElement('canvas'); c.width=exportSize; c.height=exportSize;
    const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,exportSize,exportSize);
    const a=document.createElement('a'); a.download='icon-'+exportSize+'.png'; a.href=c.toDataURL('image/png'); a.click();
    URL.revokeObjectURL(url);
  }; img.src=url;
}
function copySVG() {
  const customSVG = selectedCustomId ? (customIcons.find(ic=>ic.id===selectedCustomId)||{}).svgContent : undefined;
  const svg = generateSVG(config, exportSize, customSVG);
  try { navigator.clipboard.writeText(svg).then(()=>{showToast('SVG \uCF54\uB4DC \uBCF5\uC0AC\uB428!');}); }
  catch(e) { const ta=document.createElement('textarea'); ta.value=svg; ta.style.cssText='position:fixed;left:-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('SVG \uCF54\uB4DC \uBCF5\uC0AC\uB428!'); }
}
function saveProject() {
  const proj = { version:1, appName:'SVG Icon Maker', config, customIcons, exportSize, exportFormat };
  const blob = new Blob([JSON.stringify(proj,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.download='icon-project.json'; a.href=URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href);
}
function loadProject(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const proj = JSON.parse(e.target.result);
      if(proj.config) config = { ...config, ...proj.config };
      if(proj.customIcons) customIcons = proj.customIcons;
      if(proj.exportSize) exportSize = proj.exportSize;
      if(proj.exportFormat) exportFormat = proj.exportFormat;
      selectedIconKey = config.iconSymbol;
      render();
      showToast('\uD504\uB85C\uC81D\uD2B8 \uBD88\uB7EC\uC634!');
    } catch(err) { showToast('\uD30C\uC77C\uC744 \uC77D\uC744 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4'); }
  };
  reader.readAsText(file);
}

let toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#030213;color:#fff;padding:10px 24px;border-radius:12px;font-size:13px;z-index:999;transition:opacity 0.3s;pointer-events:none;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>{t.style.opacity='0';},2000);
}

// ===== UI Render =====
function h(tag, props, ...children) {
  const el = document.createElement(tag);
  if(props) Object.entries(props).forEach(([k,v])=>{
    if(k==='className') el.className=v;
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='innerHTML') el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{if(c!=null){if(typeof c==='string'||typeof c==='number')el.appendChild(document.createTextNode(c));else el.appendChild(c);}});
  return el;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const customSVG = selectedCustomId ? (customIcons.find(ic=>ic.id===selectedCustomId)||{}).svgContent : undefined;

  // Header
  const header = h('header',{className:'bg-white border-b border-gray-200 px-4 sm:px-6 py-3.5'},
    h('div',{className:'max-w-[1200px] mx-auto flex items-center justify-between'},
      h('div',{className:'flex items-center gap-3'},
        h('div',{className:'w-9 h-9 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shrink-0',innerHTML:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><path d="M17.5 10.5c2 0 4 1.5 4 4s-2 4-4 4"/><circle cx="6.5" cy="13.5" r="2.5"/><path d="M3 17.5c0 2 1.5 4 4 4"/><circle cx="13.5" cy="17.5" r="2.5"/></svg>'}),
        h('div',{},
          h('h1',{className:'text-gray-900 tracking-tight font-semibold'},'SVG \uC544\uC774\uCF58 \uBA54\uC774\uCEE4'),
          h('p',{className:'text-[11px] text-gray-400 -mt-0.5 hidden sm:block'},'Standalone \uBC84\uC804 \u00B7 \uC624\uD504\uB77C\uC778 \uC0AC\uC6A9 \uAC00\uB2A5')
        )
      ),
      h('div',{className:'flex items-center gap-2'},
        h('button',{className:'hidden sm:flex items-center gap-1.5 px-3 py-2 rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 text-[12px]',onClick:()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>loadProject(e.target.files[0]);inp.click();}},'\uD504\uB85C\uC81D\uD2B8 \uBD88\uB7EC\uC624\uAE30'),
        h('button',{className:'hidden sm:flex items-center gap-1.5 px-3 py-2 rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 text-[12px]',onClick:saveProject},'\uD504\uB85C\uC81D\uD2B8 \uC800\uC7A5'),
        h('button',{className:'hidden sm:flex items-center gap-1.5 px-3 py-2 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 text-[13px]',onClick:copySVG},'SVG \uBCF5\uC0AC'),
        h('button',{className:'flex items-center gap-1.5 bg-[#030213] text-white px-4 py-2 rounded-lg hover:bg-gray-800 text-[13px]',onClick:()=>{if(exportFormat==='svg')downloadSVG();else downloadPNG();}},'\uB2E4\uC6B4\uB85C\uB4DC')
      )
    )
  );
  app.appendChild(header);

  // Main layout
  const main = h('div',{className:'max-w-[1200px] mx-auto w-full px-4 sm:px-6 py-6 flex flex-col lg:flex-row gap-6',style:{minHeight:'calc(100vh - 60px)'}});

  // Preview
  const previewArea = h('div',{className:'flex-1 flex flex-col gap-4'});
  const previewCard = h('div',{className:'bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex-1 flex flex-col items-center justify-center min-h-[400px]'});
  const checker = h('div',{className:'rounded-2xl p-6 sm:p-8 inline-flex',style:{background:'repeating-conic-gradient(#f0f0f0 0% 25%, #fafafa 0% 50%) 50% / 24px 24px'}});
  checker.innerHTML = renderPreviewSVG(config, 260, customSVG);
  previewCard.appendChild(checker);

  // Size previews
  const sizeRow = h('div',{className:'mt-6 flex items-end gap-4 sm:gap-5'});
  [16,24,32,48,64].forEach(s=>{
    const col = h('div',{className:'flex flex-col items-center gap-1.5'});
    const wrap = h('div',{className:'flex items-center justify-center',style:{minHeight:'64px'}});
    wrap.innerHTML = renderPreviewSVG(config, s, customSVG);
    col.appendChild(wrap);
    col.appendChild(h('span',{className:'text-[10px] text-gray-400'},String(s)));
    sizeRow.appendChild(col);
  });
  previewCard.appendChild(sizeRow);
  previewArea.appendChild(previewCard);

  // Export options
  const exportBar = h('div',{className:'bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-wrap items-center gap-3 sm:gap-4'});
  const fmtWrap = h('div',{className:'flex items-center gap-2'});
  fmtWrap.appendChild(h('span',{className:'text-[12px] text-gray-400'},'\uD3EC\uB9F7:'));
  ['svg','png'].forEach(f=>{
    fmtWrap.appendChild(h('button',{className:'px-3 py-1.5 rounded-lg text-[12px] uppercase tracking-wide transition-colors '+(exportFormat===f?'bg-[#030213] text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'),onClick:()=>{exportFormat=f;render();}},f));
  });
  exportBar.appendChild(fmtWrap);
  exportBar.appendChild(h('div',{className:'w-px h-6 bg-gray-200 hidden sm:block'}));
  const sizeWrap = h('div',{className:'flex items-center gap-2 flex-wrap'});
  sizeWrap.appendChild(h('span',{className:'text-[12px] text-gray-400'},'\uD06C\uAE30:'));
  [16,24,32,48,64].forEach(s=>{
    sizeWrap.appendChild(h('button',{className:'px-2.5 py-1.5 rounded-lg text-[12px] transition-colors '+(exportSize===s?'bg-[#030213] text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'),onClick:()=>{exportSize=s;render();}},String(s)));
  });
  exportBar.appendChild(sizeWrap);
  // Mobile buttons
  exportBar.appendChild(h('button',{className:'sm:hidden flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-gray-200 text-gray-500 text-[12px]',onClick:copySVG},'SVG \uBCF5\uC0AC'));
  exportBar.appendChild(h('button',{className:'sm:hidden flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-gray-200 text-gray-500 text-[12px]',onClick:saveProject},'\uC800\uC7A5'));
  exportBar.appendChild(h('button',{className:'sm:hidden flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-gray-200 text-gray-500 text-[12px]',onClick:()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>loadProject(e.target.files[0]);inp.click();}},'\uBD88\uB7EC\uC624\uAE30'));
  previewArea.appendChild(exportBar);
  main.appendChild(previewArea);

  // ===== Controls Panel =====
  const panel = h('div',{className:'lg:w-[360px] w-full'});
  const panelCard = h('div',{className:'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col'});

  // Tabs
  const tabs = h('div',{className:'flex border-b border-gray-100'});
  [{k:'shape',l:'\uBAA8\uC591'},{k:'color',l:'\uC0C9\uC0C1'},{k:'icon',l:'\uC544\uC774\uCF58'},{k:'edit',l:'\uD3B8\uC9D1'},{k:'effects',l:'\uD6A8\uACFC'}].forEach(tab=>{
    tabs.appendChild(h('button',{className:'flex-1 py-3 text-[13px] transition-colors border-b-2 '+(activeTab===tab.k?'border-[#030213] text-[#030213]':'border-transparent text-gray-400 hover:text-gray-600'),onClick:()=>{activeTab=tab.k;render();}},tab.l));
  });
  panelCard.appendChild(tabs);

  const content = h('div',{className:'p-5 space-y-5 overflow-y-auto max-h-[60vh] lg:max-h-[calc(100vh-220px)] cs'});

  if(activeTab==='shape') {
    content.appendChild(h('label',{className:'text-[12px] text-gray-400 uppercase tracking-wider block'},'\uBC30\uACBD \uBAA8\uC591'));
    const grid = h('div',{className:'grid grid-cols-3 gap-2'});
    SHAPES.forEach(s=>{
      const btn = h('button',{className:'flex flex-col items-center gap-2 p-3 rounded-xl border-2 transition-all '+(config.shape===s.type?'border-[#030213] bg-gray-50':'border-gray-100 hover:border-gray-200'),onClick:()=>{config.shape=s.type;render();}});
      const thumbPath = getShapePath(s.type);
      if(s.type==='none') btn.innerHTML='<svg width="38" height="38" viewBox="0 0 100 100"><line x1="20" y1="20" x2="80" y2="80" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round"/><line x1="80" y1="20" x2="20" y2="80" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round"/></svg>';
      else btn.innerHTML='<svg width="38" height="38" viewBox="0 0 100 100"><path d="'+thumbPath+'" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="2"/></svg>';
      btn.appendChild(h('span',{className:'text-[11px] text-gray-500'},s.label));
      grid.appendChild(btn);
    });
    content.appendChild(grid);
  }

  if(activeTab==='color') {
    // Gradient toggle
    content.appendChild(makeToggle('\uADF8\uB77C\uB514\uC5B8\uD2B8', config.useGradient, v=>{config.useGradient=v;render();}));
    content.appendChild(makeColorPicker(config.useGradient?'\uC2DC\uC791 \uC0C9\uC0C1':'\uBC30\uACBD \uC0C9\uC0C1', config.bgColor1, c=>{config.bgColor1=c;render();}));
    if(config.useGradient) {
      content.appendChild(makeColorPicker('\uB05D \uC0C9\uC0C1', config.bgColor2, c=>{config.bgColor2=c;render();}));
      // Gradient presets
      const gpLabel = h('label',{className:'text-[12px] text-gray-400 uppercase tracking-wider block'},'\uADF8\uB77C\uB514\uC5B8\uD2B8 \uD504\uB9AC\uC14B');
      content.appendChild(gpLabel);
      const gpRow = h('div',{className:'flex flex-wrap gap-2'});
      GRADIENT_PRESETS.forEach(g=>{
        gpRow.appendChild(h('button',{className:'w-9 h-9 rounded-lg border-2 border-gray-100 hover:border-gray-300 transition-all hover:scale-105',style:{background:'linear-gradient(135deg,'+g.f+','+g.t+')'},onClick:()=>{config.bgColor1=g.f;config.bgColor2=g.t;render();}}));
      });
      content.appendChild(gpRow);
      content.appendChild(makeSlider('\uADF8\uB77C\uB514\uC5B8\uD2B8 \uAC01\uB3C4', config.gradientAngle, 0, 360, 1, '\u00B0', v=>{config.gradientAngle=v;render();}));
    }
    content.appendChild(makeColorPicker('\uC544\uC774\uCF58 \uC0C9\uC0C1', config.iconColor, c=>{config.iconColor=c;render();}));
  }

  if(activeTab==='icon') {
    // Search
    const searchWrap = h('div',{className:'relative'});
    const searchInput = h('input',{type:'text',placeholder:'\uC544\uC774\uCF58 \uAC80\uC0C9...',className:'w-full bg-gray-50 rounded-lg pl-3 pr-3 py-2 text-[13px] text-gray-600 border border-gray-200 outline-none focus:border-gray-400',value:iconSearch});
    searchInput.addEventListener('input',e=>{iconSearch=e.target.value;render();});
    searchWrap.appendChild(searchInput);
    content.appendChild(searchWrap);

    // Icon grid
    const iconKeys = Object.keys(ICON_SVG_DATA);
    const filtered = iconSearch ? iconKeys.filter(k=>k.toLowerCase().includes(iconSearch.toLowerCase())) : iconKeys;
    content.appendChild(h('span',{className:'text-[11px] text-gray-400 block'},filtered.length+'\uAC1C \uC544\uC774\uCF58'));
    const iconGrid = h('div',{className:'grid grid-cols-6 gap-1'});
    filtered.slice(0,120).forEach(key=>{
      const isActive = config.iconSymbol===key && !selectedCustomId;
      const btn = h('button',{className:'p-2 rounded-lg border-2 transition-all flex items-center justify-center aspect-square '+(isActive?'border-[#030213] bg-gray-50':'border-transparent hover:border-gray-200 hover:bg-gray-50'),title:key,onClick:()=>{config.iconSymbol=key;selectedCustomId=null;render();}});
      btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4B5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICON_SVG_DATA[key]+'</svg>';
      iconGrid.appendChild(btn);
    });
    content.appendChild(iconGrid);

    // Custom icons
    if(customIcons.length>0) {
      content.appendChild(h('label',{className:'text-[12px] text-gray-400 uppercase tracking-wider block mt-3'},'\uB0B4 \uC544\uC774\uCF58'));
      const ciGrid = h('div',{className:'grid grid-cols-4 gap-1.5'});
      customIcons.forEach(ic=>{
        const isActive = selectedCustomId===ic.id;
        const btn = h('button',{className:'w-full p-2 rounded-lg border-2 transition-all flex flex-col items-center justify-center gap-1 aspect-square '+(isActive?'border-purple-500 bg-purple-50':'border-transparent hover:border-gray-200 hover:bg-gray-50'),title:ic.name,onClick:()=>{selectedCustomId=ic.id;render();}});
        btn.innerHTML='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4B5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ic.svgContent+'</svg>';
        btn.appendChild(h('span',{className:'text-[8px] text-gray-400 truncate w-full text-center'},ic.name));
        ciGrid.appendChild(btn);
      });
      content.appendChild(ciGrid);
    }

    content.appendChild(makeSlider('\uC544\uC774\uCF58 \uD06C\uAE30', Math.round(config.iconScale*100), 30, 160, 5, '%', v=>{config.iconScale=v/100;render();}));
  }

  if(activeTab==='edit') {
    content.appendChild(makeSlider('\uC120 \uB450\uAED8', config.iconStrokeWidth, 0.5, 3.5, 0.1, 'px', v=>{config.iconStrokeWidth=v;render();}));
    content.appendChild(makeSlider('\uD68C\uC804', config.iconRotation, 0, 360, 1, '\u00B0', v=>{config.iconRotation=v;render();}));
    content.appendChild(makeSlider('X \uC624\uD504\uC14B', config.iconOffsetX, -20, 20, 1, 'px', v=>{config.iconOffsetX=v;render();}));
    content.appendChild(makeSlider('Y \uC624\uD504\uC14B', config.iconOffsetY, -20, 20, 1, 'px', v=>{config.iconOffsetY=v;render();}));
    content.appendChild(makeToggle('\uCC44\uC6B0\uAE30', config.iconFilled, v=>{config.iconFilled=v;render();}));
    content.appendChild(makeToggle('\uC88C\uC6B0 \uBC18\uC804', config.iconFlipH, v=>{config.iconFlipH=v;render();}));
    content.appendChild(makeToggle('\uC0C1\uD558 \uBC18\uC804', config.iconFlipV, v=>{config.iconFlipV=v;render();}));
    content.appendChild(makeSlider('\uBD88\uD22C\uBA85\uB3C4', Math.round(config.iconOpacity*100), 10, 100, 5, '%', v=>{config.iconOpacity=v/100;render();}));
  }

  if(activeTab==='effects') {
    content.appendChild(makeToggle('\uADF8\uB9BC\uC790', config.shadowEnabled, v=>{config.shadowEnabled=v;render();}));
    content.appendChild(makeToggle('\uD14C\uB450\uB9AC', config.borderEnabled, v=>{config.borderEnabled=v;render();}));
    if(config.borderEnabled) {
      content.appendChild(makeColorPicker('\uD14C\uB450\uB9AC \uC0C9\uC0C1', config.borderColor, c=>{config.borderColor=c;render();}));
      content.appendChild(makeSlider('\uD14C\uB450\uB9AC \uB450\uAED8', config.borderWidth, 1, 10, 1, '', v=>{config.borderWidth=v;render();}));
    }
  }

  panelCard.appendChild(content);
  panel.appendChild(panelCard);
  main.appendChild(panel);
  app.appendChild(main);
}

// ===== UI Helpers =====
function makeToggle(label, value, onChange) {
  const row = h('div',{className:'flex items-center justify-between'});
  row.appendChild(h('label',{className:'text-[13px] text-gray-500'},label));
  const btn = h('button',{className:'w-10 h-6 rounded-full transition-colors relative '+(value?'bg-[#030213]':'bg-gray-300'),onClick:()=>onChange(!value)});
  btn.appendChild(h('div',{className:'w-4 h-4 bg-white rounded-full absolute top-1 transition-transform '+(value?'translate-x-5':'translate-x-1')}));
  row.appendChild(btn);
  return row;
}

function makeSlider(label, value, min, max, step, suffix, onChange) {
  const wrap = h('div',{});
  const top = h('div',{className:'flex items-center justify-between mb-2'});
  top.appendChild(h('label',{className:'text-[12px] text-gray-400 uppercase tracking-wider'},label));
  top.appendChild(h('span',{className:'text-[12px] text-gray-500'},Math.round(value)+suffix));
  wrap.appendChild(top);
  const inp = h('input',{type:'range',min:String(min),max:String(max),step:String(step),value:String(value),className:'w-full accent-[#030213]'});
  inp.addEventListener('input',e=>onChange(Number(e.target.value)));
  wrap.appendChild(inp);
  return wrap;
}

function makeColorPicker(label, value, onChange) {
  const wrap = h('div',{});
  wrap.appendChild(h('label',{className:'text-[12px] text-gray-400 uppercase tracking-wider mb-2 block'},label));
  const row = h('div',{className:'flex items-center gap-2 mb-2'});
  const cInp = h('input',{type:'color',value:value,className:'w-9 h-9 rounded-lg border-2 border-gray-200 cursor-pointer p-0'});
  cInp.addEventListener('input',e=>onChange(e.target.value));
  row.appendChild(cInp);
  const tInp = h('input',{type:'text',value:value,className:'flex-1 bg-gray-50 rounded-lg px-3 py-2 text-[13px] text-gray-600 border border-gray-200 outline-none focus:border-gray-400'});
  tInp.addEventListener('change',e=>onChange(e.target.value));
  row.appendChild(tInp);
  wrap.appendChild(row);
  const swatches = h('div',{className:'flex flex-wrap gap-1.5'});
  ['#FFFFFF','#000000',...PRESET_COLORS.slice(0,10)].forEach(c=>{
    swatches.appendChild(h('button',{className:'w-6 h-6 rounded-md border-2 transition-transform hover:scale-110 '+(value.toLowerCase()===c.toLowerCase()?'border-gray-800 scale-110':'border-gray-200'),style:{backgroundColor:c},onClick:()=>onChange(c)}));
  });
  wrap.appendChild(swatches);
  const darkLabel = h('span',{className:'text-[10px] text-gray-400 mb-1 block mt-2'},'\uB2E4\uD06C \uBC30\uACBD');
  wrap.appendChild(darkLabel);
  const darkRow = h('div',{className:'flex flex-wrap gap-1.5'});
  DARK_BG.forEach(c=>{darkRow.appendChild(h('button',{className:'w-6 h-6 rounded-md border-2 transition-transform hover:scale-110 '+(value.toLowerCase()===c.toLowerCase()?'border-gray-800 scale-110':'border-gray-200'),style:{backgroundColor:c},onClick:()=>onChange(c)}));});
  wrap.appendChild(darkRow);
  return wrap;
}

// Initial render
render();
</script>
</body>
</html>
